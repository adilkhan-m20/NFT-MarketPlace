version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nft-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      # Add your env vars here or use a .env file
      # - PRIVATE_KEY=${PRIVATE_KEY}
      # - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
    volumes:
      - ./backend:/app # live reload in dev
      - /app/node_modules # don't overwrite container's node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nft-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CONTRACT_ADDRESS=${NEXT_PUBLIC_CONTRACT_ADDRESS}
    depends_on:
      - backend

# Run locally with:
#   docker compose up --build
